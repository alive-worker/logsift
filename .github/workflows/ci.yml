name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        # -race omitted: image and tests run with CGO_ENABLED=0 for portable
        # static binaries; reintroduce -race when goroutine code lands
        # (e.g. the --tail task) and a separate CGO-enabled job is added.
        run: go test -count=1 ./...

      - name: Build
        run: go build ./...
